module:
  id: aws/ec2/instance
  name: ec2-instance
  system: aws
  version: 0.1.0
  description: "Simple EC2 instance module with common inputs for AMI, instance type, networking and tags"
  categories:
    - compute
    - ec2
  authors:
    - name: "sarath2k01"
      email: ""
  registry_visibility: private
  example: |
    module "ec2_instance" {
      source        = "git::https://github.com/Sarath2k01/registry-tf-private.git//modules/aws/ec2/instance?ref=v0.1.0"
      ami           = "ami-0123456789abcdef0"
      instance_type = "t3.micro"
      subnet_id     = "subnet-0abc1234"
    }
